AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: >
  SAM Image Classifier - ONNX Runtime image classification app

Parameters:
  ModelKey:
    Type: String
    Default: models/weight.onnx
    Description: S3 key for the ONNX model file. Change this to swap models.

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Architectures:
      - x86_64
    Environment:
      Variables:
        MODEL_BUCKET: !Ref ModelBucket
        MODEL_KEY: !Ref ModelKey
        CORS_ORIGIN: '*'
        LOCALSTACK_ENDPOINT: ''
  Api:
    Cors:
      AllowMethods: "'POST,OPTIONS'"
      AllowHeaders: "'Content-Type'"
      AllowOrigin: "'*'"

Resources:
  ModelBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'sam-image-classifier-models-${AWS::AccountId}'

  ClassifyFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Timeout: 60
      MemorySize: 1024
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref ModelBucket
      Events:
        Classify:
          Type: Api
          Properties:
            Path: /classify
            Method: post
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: ./lambda
      DockerTag: latest

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"

  ModelBucketName:
    Description: "Model S3 bucket name"
    Value: !Ref ModelBucket
